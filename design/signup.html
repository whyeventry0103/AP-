<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Ludo - Sign Up</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="signup.css"/>
</head>
<body>
  <div class="page">
    <div class="auth-container">
      <div class="auth-header">
        <h1 class="auth-title">🎲 LUDO</h1>
        <p class="auth-subtitle">Create Your Account</p>
      </div>

      <div class="auth-card">
        <h2>Sign Up</h2>
        
        <form id="signup-form">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input 
              type="text" 
              id="username" 
              class="form-input"
              placeholder="Choose a username"
              required
              minlength="2"
              maxlength="20"
            />
            <span class="form-hint">Must be unique and 2-20 characters</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="dob">Date of Birth</label>
            <input 
              type="date" 
              id="dob" 
              class="form-input"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input 
              type="password" 
              id="password" 
              class="form-input"
              placeholder="Enter a strong password"
              required
              minlength="6"
            />
            <span class="form-hint">Minimum 6 characters</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <input 
              type="password" 
              id="confirm-password" 
              class="form-input"
              placeholder="Re-enter your password"
              required
              minlength="6"
            />
          </div>

          <button type="submit" class="form-button">Create Account</button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="login.html" class="auth-link">Login</a></p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
