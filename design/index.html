<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Ludo - Welcome</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="index.css"/>
</head>
<body>
  <div class="page">
    <div class="hero-container">
      <h1 class="hero-title">🎲 LUDO</h1>
      <p class="hero-subtitle">Classic Board Game Experience</p>

      <div class="form-card">
        <h2>Welcome to LUDO</h2>
        
        <div class="auth-options">
          <p class="options-label">Join the Game</p>
          <a href="login.html" class="option-button login-button">🔐 Login</a>
          <a href="signup.html" class="option-button signup-button">✨ Sign Up</a>
        </div>

        <div class="rules-section">
          <h3>Quick Rules</h3>
          <ul>
            <li>Roll the dice to move your tokens</li>
            <li>Get all 4 tokens from home to the finish</li>
            <li>First player to finish wins!</li>
            <li>Capture opponents' tokens to send them home</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
